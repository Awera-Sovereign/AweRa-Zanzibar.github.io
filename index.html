<!DOCTYPE html>
<html>
<head>
    <title>AweRa | The Sovereign Experience</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        #overlay {
            position: absolute; bottom: 20px; left: 20px; color: #D4AF37;
            font-family: 'Garamond', serif; z-index: 10; pointer-events: none;
        }
        #unlock-button {
            position: absolute; top: 20px; right: 20px;
            padding: 12px 24px; background: #D4AF37; color: black; border: none;
            cursor: pointer; font-size: 16px; z-index: 100; font-weight: bold;
            border-radius: 5px;
        }
        #book-button {
            display: none; /* Hidden by default */
            position: absolute; bottom: 80px; left: 20px;
            padding: 15px 30px; background: #D4AF37; color: black; border: none;
            cursor: pointer; font-size: 18px; z-index: 100; font-weight: bold;
            border-radius: 50px; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
    </style>
    <script>
      function handleInteraction() {
        var audio = document.getElementById('chaching');
        var sky = document.getElementById('main-sky');
        var bookBtn = document.getElementById('book-button');
        var current = sky.getAttribute('src');
        
        audio.currentTime = 0;
        audio.play();

        if (current === '#lexus') {
          sky.setAttribute('src', '#empire'); // Sultan Mode
          bookBtn.style.display = 'block';
          bookBtn.innerText = 'BOOK SULTAN ESTATE';
        } else if (current === '#empire') {
          sky.setAttribute('src', '#ocean'); // Navigator Mode
          bookBtn.style.display = 'block';
          bookBtn.innerText = 'BOOK NAVIGATOR DHOW';
        } else {
          sky.setAttribute('src', '#lexus'); // Back to Pilot
          bookBtn.style.display = 'none';
        }
      }

      function openBooking() {
          // This will eventually be your Expedia or Booking.com link
          alert('Redirecting to AweRa Booking Engine...');
          window.location.href = "https://www.expedia.com"; 
      }
    </script>
</head>
<body>
    <button id="unlock-button" onclick="document.getElementById('chaching').play(); this.style.display='none';">ACTIVATE EMPIRE SENSES</button>
    
    <button id="book-button" onclick="openBooking()">BOOK NOW</button>

    <div id="overlay">
        <h1>AweRa</h1>
        <p>Phase 1: Incubation. Target: $464 Trillion Vision.</p>
    </div>

    <a-scene>
        <a-assets>
            <img id="lexus" src="goal.png.jpg">
            <img id="empire" src="empire.jpg">
            <img id="ocean" src="ocean.jpg">
            <audio id="chaching" src="success.mp3" preload="auto"></audio>
        </a-assets>

        <a-sky id="main-sky" src="#lexus" rotation="0 -90 0"></a-sky> 

        <a-entity cursor="rayOrigin: mouse"></a-entity>
        
        <a-box position="0 1.5 -3" 
               rotation="0 45 0" 
               color="#D4AF37"
               animation="property: rotation; to: 0 405 0; loop: true; dur: 10000"
               onclick="handleInteraction()">
        </a-box>
        
        <a-text value="TAP GOLD TO TRAVEL PATHS" position="-1.5 2.8 -2.5" color="white" width="4"></a-text>
    </a-scene>
</body>
</html>
